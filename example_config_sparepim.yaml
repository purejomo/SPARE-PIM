Frontend:
  impl: SPAREPIMTrace
  clock_ratio: 1
  path: example_sparepim.trace

  # GPT-baby scale configuration from the SPARE-PIM experiment table.
  # The FSU processes 16 FP16 elements per SIMD command.
  seq_len: 256
  d_head: 64
  fsu_width: 16
  max_voc_per_bpu: 16
  expected_voc_count: 16
  validate_voc_count: true
  acc_commands_per_token: 2

MemorySystem:
  impl: GenericDRAM
  clock_ratio: 1

  DRAM:
    impl: HBM3
    org:
      preset: HBM3_2Gb
      channel: 1
      pseudochannel: 2
      bankgroup: 4
      bank: 4
      row: 8192
      column: 64
    timing:
      preset: HBM3_2Gbps

      # SPARE-PIM paper Table III override at 1GHz.
      nBL: 4
      nCL: 18
      nRCDRD: 14
      nRCDWR: 14
      nRP: 14
      nRAS: 34
      nRC: 48
      nCCDS: 1
      nCCDL: 2
      nRRDL: 6
      nFAW: 30

  Controller:
    impl: SPAREPIM
    queue_size: 16
    spm_cycles_per_voc: 1
    spm_fixed_cycles: 0
    bgmu_read_as_delay: true
    enable_act_spm_pre: true
    enable_esdm: true
    enable_qk_act_pre: true

    # Match the configured HBM3 column count for ESDM row-column placement.
    esdm_columns_per_row: 64

  AddrMapper:
    impl: ChRaBaRoCo
